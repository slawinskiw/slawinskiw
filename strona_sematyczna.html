<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <title>Typowa Witryna Internetowa</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge,chrome=1" />
    <link rel="stylesheet" type="text/css" href="style.css">
    <style type="text/css">
        * {
            box-sizing: border-box;
        }
        body {
            background: silver;
            padding: 20px;
        }
        header {
            border: 1px solid grey;
            width: 100%;
            background: white;
            padding: 20px;
        }
        nav {
            border: 1px solid grey;
            width: 50%;
            padding: 20px;
            background: silver;
        }
        main {
            float: left;
            width: 60%;
            margin-top: 2%;
            background: white;
            margin-bottom: 2%;
        }
        section {
            border: 1px solid yellow;
            margin-bottom: 2%;
            background: white;
        }
        article {
            border: 1px solid blue;
        }
        aside {
            padding-left: 2%;
            margin-top: 2%;
            width: 38%;
            float: right;
        }
        footer {
            border: 1px solid green;
            width: 100%;
            clear: both;
            padding: 20px;
            background: white;
        }
    </style>
</head>
<body div id="blok">
    <header>
        <h1> Typowa Strona Internetowa </h1>
        <nav>
            <ul>
                <li><a href="#"> Strona Główna </a></li>
                <li><a href="#"> Produkty </a></li>
                <li><a href="#"> O nas </a></li>
                <li><a href="#"> Kontakt </a></li>
            </ul>
        </nav>
    </header>
    <main>
        <article>
            <h2> Nagłówek </h2>
                <p> To jest tekst artyułu </p>
        </article>
    </main>
    <aside>
        <section><p>Sekcja</p></section>
        <section><p>Sekcja</p></section>
        <section><p>Sekcja</p></section>
    </aside>
    <footer> Copyright 2026 </footer>
    <div style="background-color:grey; clear:both;">
        <center>
            &copy; W.S. OCTOBER 2025
        </center>
    </div>
</body>
</html>
